apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-nginx-deployment
  labels:
    app: app1-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1-nginx
  template:
    metadata:
      labels:
        app: app1-nginx
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: app1-nginx
          image: rgacrdev01.azurecr.io/app1/cloudsaga-nginx-acr:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          # Requests & Limits 
          resources:
            requests:
              cpu: "100m" 
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"                     
   