apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app1-deployment
  labels:
    app: nginx-app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app1
  template:
    metadata:
      labels:
        app: nginx-app1    
    spec:
      containers:
        - name: nginx-app1
          image: stacksimplify/kube-nginxapp1:1.0.0
          ports:
            - containerPort: 80    