apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app2-deployment
  labels:
    app: nginx-app2
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: nginx-app2
  template:
    metadata:
      labels:
        app: nginx-app2 
    spec:
      containers:
        - name: nginx-app2
          image: stacksimplify/kube-nginxapp2:1.0.0
          ports:
            - containerPort: 80