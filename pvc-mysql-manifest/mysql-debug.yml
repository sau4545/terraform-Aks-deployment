apiVersion: v1
kind: Pod
metadata:
  name: mysql-debug
spec:
  restartPolicy: Never
  containers:
  - name: debug
    image: busybox
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: mysql-persistent-storage
      mountPath: /mnt
  volumes:
  - name: mysql-persistent-storage
    persistentVolumeClaim:
      claimName: azure-managed-pvc
